            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);

            font-size: 1.4rem;
            font-weight: 700;
            color: var(--jp-blue);
            margin-bottom: 15px;
            line-height: 2;
        }

        .particle-input {
            width: 60px;
            display: inline-block;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--jp-red);
            padding: 5px;
        }

        .particle-input:focus {
            border-color: var(--jp-blue);
            outline: none;
        }

        .explanation {
            display: none;
            margin-top: 15px;
            padding: 15px;
            border-radius: 12px;
            font-size: 0.95rem;
        }

        .wrong-feedback { background-color: #fff1f2; color: #991b1b; border-left: 5px solid var(--jp-red); }
        .correct-feedback { background-color: #f0fdf4; color: #166534; border-left: 5px solid var(--jp-green); }

        .score-board {
            position: sticky;
            top: 80px;
            z-index: 100;
            background: white;
            border-radius: 50px;
            padding: 10px 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);

    const quizContainer = document.getElementById('quizContainer');
    let totalScore = 0;

    // สร้างข้อสอบ
    quizData.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'quiz-card';
        card.innerHTML = `
            <div class="sentence-box">
                ${index + 1}. ${item.sentence[0]} 
                <input type="text" class="particle-input" id="input-${index}" maxlength="2" placeholder="?"> 
                ${item.sentence[1]}
            </div>
            <div class="text-muted small mb-2">คำแปล: ${item.meaning}</div>
            <div id="feedback-${index}" class="explanation">
                <div class="fw-bold mb-1" id="status-text-${index}"></div>
                <div id="explain-text-${index}"></div>
            </div>
        `;
        quizContainer.appendChild(card);
    });

    function checkAll() {
        totalScore = 0;
        quizData.forEach((item, index) => {
            const userInput = document.getElementById(`input-${index}`).value.trim();
            const feedback = document.getElementById(`feedback-${index}`);
            const statusText = document.getElementById(`status-text-${index}`);
            const explainText = document.getElementById(`explain-text-${index}`);

            feedback.style.display = "block";

            if (userInput === item.answer || (item.answer === "へ" && userInput === "に")) {
                totalScore++;
                feedback.className = "explanation correct-feedback";
                statusText.innerHTML = `<i class="bi bi-check-circle-fill me-2"></i>ถูกต้อง!`;
                explainText.innerText = "เก่งมากครับ!";
            } else {
                feedback.className = "explanation wrong-feedback";
                statusText.innerHTML = `<i class="bi bi-x-circle-fill me-2"></i>ผิดครับ (คำตอบคือ: ${item.answer})`;
                explainText.innerHTML = item.explain;
            }
        });

        document.getElementById('currentScore').innerText = totalScore;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
