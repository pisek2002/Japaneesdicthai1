    <style>
        :root {
            --jp-blue: #1d3557;
            --jp-red: #e63946;
            --jp-green: #2ecc71;
            --jp-light: #f4f7f6;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--jp-light);
            padding-bottom: 50px;
        }

        .kanit { font-family: 'Kanit', sans-serif; }
        .navbar { background-color: var(--jp-blue); }

        .quiz-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .sentence-box {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--jp-blue);
            margin-bottom: 5px;
            line-height: 1.8;
        }

        /* สไตล์สำหรับ Romaji ที่เว้นช่องว่าง */
        .romaji-box {
            color: var(--jp-green);
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            font-family: 'Courier New', Courier, monospace;
            background: #f0fff4;
            display: inline-block;
            padding: 2px 10px;
            border-radius: 5px;
        }

        .particle-input {
            width: 55px;
            display: inline-block;
            border: 2px solid #ddd;
            border-radius: 12px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--jp-red);
            padding: 4px;
        }

        .particle-input:focus {
            border-color: var(--jp-blue);
            outline: none;
        }

        .explanation {
            display: none;
            margin-top: 15px;
            padding: 15px;
            border-radius: 15px;
            font-size: 0.95rem;
        }

        .wrong-feedback { background-color: #fff1f2; color: #991b1b; border-left: 5px solid var(--jp-red); }
        .correct-feedback { background-color: #f0fdf4; color: #166534; border-left: 5px solid var(--jp-green); }

        .score-board {
            position: sticky;
            top: 75px;
            z-index: 100;
            background: white;
            border-radius: 50px;
            padding: 12px 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>

            const isCorrect = (userInput === item.answer) || 
                              (item.answer === "へ" && userInput === "に") || 
                              (item.answer === "に" && userInput === "へ" && item.romaji_hidden.includes("ikimasu"));

            if (isCorrect) {
                totalScore++;
                feedback.className = "explanation correct-feedback";
                statusText.innerHTML = `<i class="bi bi-check-circle-fill me-2"></i>ถูกต้อง!`;
                explainText.innerText = "คำตอบที่สมบูรณ์: " + item.romaji_hidden.replace("( _ )", item.answer);
                inputField.style.borderColor = "#2ecc71";
            } else {
                feedback.className = "explanation wrong-feedback";
                statusText.innerHTML = `<i class="bi bi-x-circle-fill me-2"></i>คำตอบคือ: ${item.answer}`;
                explainText.innerHTML = item.explain;
                inputField.style.borderColor = "#e63946";
            }
        });

        document.getElementById('currentScore').innerText = totalScore;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>

</body>
</html>
