<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>คลังศัพท์เฉพาะทาง - Pisek Sensei</title>
    
    <!-- CSS Frameworks -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Kanit:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #0d6efd;
            --dark-navy: #2c313c;
            --bg-gray: #f4f6f9;
        }

        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; }
        .kanit { font-family: 'Kanit', sans-serif; }
        .navbar { background-color: var(--dark-navy); z-index: 2000; }

        /* Header & Search */
        .header-box {
            background: white; padding: 25px 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative; z-index: 1500;
        }
        .search-wrapper {
            max-width: 500px; margin: 0 auto;
            border: 2px solid var(--primary-blue); border-radius: 50px;
            overflow: hidden; background: white;
        }

        /* Tabs Navigation */
        .tabs-sticky {
            position: sticky; top: 56px;
            background: #ffffff; z-index: 1800;
            padding: 12px 0; border-bottom: 1px solid #eee;
        }
        .category-tabs {
            display: flex; overflow-x: auto; white-space: nowrap; 
            gap: 12px; padding: 5px 20px; scrollbar-width: none;
        }
        .category-tabs::-webkit-scrollbar { display: none; }

        .tab-item {
            padding: 8px 20px; background: #f8f9fa; border: 2px solid #dee2e6; 
            color: #495057; border-radius: 50px; font-weight: 700; cursor: pointer; 
            transition: 0.2s;
        }
        .tab-item.active { 
            background: var(--primary-blue); border-color: var(--primary-blue); color: white; 
            box-shadow: 0 4px 10px rgba(13,110,253,0.3); 
        }

        /* Vocab Cards */
        .vocab-card {
            background: white; border-radius: 15px; padding: 20px;
            border-left: 6px solid var(--primary-blue); height: 100%;
            box-shadow: 0 3px 10px rgba(0,0,0,0.03);
            transition: 0.3s; position: relative;
        }
        .vocab-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .hira-text { color: var(--primary-blue); font-weight: 600; font-size: 0.95rem; }
        .meaning-box { 
            background: #f8f9fa; padding: 12px; border-radius: 10px; 
            margin-top: 10px; border: 1px solid #eee; font-weight: 700; color: #212529;
        }

        /* Loading & Footer UI */
        #statusArea { font-weight: bold; color: #666; }
        #loadingSpinner { display: none; padding: 20px; text-align: center; width: 100%; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark sticky-top shadow-sm">
    <div class="container d-flex align-items-center">
        <div class="intro-content d-flex align-items-center">
            <img src="image/logo.jpg" alt="Logo" style="width: 40px; height: 40px; border-radius: 50%; margin-right: 10px;">
            <a class="navbar-brand fw-bold kanit" href="index.html">TECHNICAL VOCAB</a>
        </div>
        <a href="index.html" class="btn btn-sm btn-outline-light rounded-pill ms-auto">กลับหน้าหลัก</a>
    </div>
</nav>

<div class="header-box text-center">
    <h4 class="fw-bold mb-3 text-dark kanit">ศัพท์เฉพาะทาง (Technical Vocabulary)</h4>
    <p class="text-muted small mb-3">60 หมวดหมู่ มีคำศัพท์มากกว่า 60,000+ คำ</p>
    <div class="search-wrapper shadow-sm d-flex align-items-center">
        <span class="px-3"><i class="bi bi-search text-primary"></i></span>
        <input type="text" id="smartSearch" class="form-control border-0 shadow-none" 
               placeholder="ค้นหาคันจิ, คำอ่าน, ความหมาย..." onkeyup="handleSearch()">
    </div>
</div>

<div class="tabs-sticky">
    <div class="category-tabs" id="tabContainer">
        <div class="tab-item active" id="defaultTab" onclick="setTab('All', this)">ทั้งหมด</div>
    </div>
</div>

<div class="container py-4">
    <div id="statusArea" class="text-center py-5">
        <div class="spinner-border text-primary mb-2"></div>
        <p>กำลังเตรียมฐานข้อมูลขนาดใหญ่...</p>
    </div>
    
    <div class="row g-3" id="vocabList"></div>
    
    <!-- Spinner สำหรับแจ้งเตือนว่ากำลังโหลดเพิ่ม -->
    <div id="loadingSpinner">
        <div class="spinner-border spinner-border-sm text-primary"></div>
        <span class="ms-2 small text-muted">กำลังโหลดเพิ่ม...</span>
    </div>
</div>

<script>
    let vocabData = []; 
    let filteredData = [];
    let activeTab = 'All';
    let currentPage = 1;
    const itemsPerPage = 40; // จำนวนการ์ดต่อหนึ่งการโหลด
    let isSearchTimeout = null;

    // โหลดข้อมูลจากไฟล์ JSON
    async function loadData() {
        const status = document.getElementById('statusArea');
        try {
            const response = await fetch('technical_data.json');
            if (!response.ok) throw new Error();
            vocabData = await response.json();
            
            status.classList.add('d-none');
            renderTabs();
            filterData();
            
            // ตรวจจับการ Scroll เพื่อทำ Infinite Scroll
            window.addEventListener('scroll', () => {
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
                    renderNextBatch();
                }
            });
        } catch (e) {
            status.innerHTML = `<div class="alert alert-danger">ไม่พบไฟล์ technical_data.json หรือเกิดข้อผิดพลาดในการโหลด</div>`;
        }
    }

    // สร้างปุ่มหมวดหมู่
    function renderTabs() {
        const container = document.getElementById('tabContainer');
        const categories = [...new Set(vocabData.map(item => item.หมวด))].filter(Boolean);
        
        categories.forEach(cat => {
            const div = document.createElement('div');
            div.className = 'tab-item';
            div.innerText = cat;
            div.onclick = function() { setTab(cat, this); };
            container.appendChild(div);
        });
    }

    // จัดการ Search แบบ Debounce (หน่วงเวลาพิมพ์เพื่อให้ลื่นขึ้น)
    function handleSearch() {
        clearTimeout(isSearchTimeout);
        isSearchTimeout = setTimeout(() => {
            filterData();
        }, 300); // รอให้หยุดพิมพ์ 0.3 วินาทีค่อยเริ่มหา
    }

    function setTab(cat, el) {
        activeTab = cat;
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        filterData();
    }

    function filterData() {
        const query = document.getElementById('smartSearch').value.toLowerCase().trim();
        
        // กรองข้อมูล
        filteredData = vocabData.filter(item => {
            const matchTab = (activeTab === 'All' || item.หมวด === activeTab);
            if (!matchTab) return false;
            
            if (query === '') return true;
            
            return (item.คันจิ || '').toLowerCase().includes(query) || 
                   (item.ฮิระงะนะ || '').toLowerCase().includes(query) || 
                   (item.ความหมายไทย || '').toLowerCase().includes(query) || 
                   (item.Romaji || '').toLowerCase().includes(query);
        });

        // รีเซ็ตหน้าจอแสดงผล
        currentPage = 1;
        document.getElementById('vocabList').innerHTML = '';
        renderNextBatch();
    }

    function renderNextBatch() {
        const list = document.getElementById('vocabList');
        const spinner = document.getElementById('loadingSpinner');
        
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const batch = filteredData.slice(start, end);

        if (batch.length === 0) return;

        spinner.style.display = 'block';

        // สร้าง HTML แบบ String ครั้งเดียว (เร็วกว่า)
        const html = batch.map(item => {
            const hira = item.ฮิระงะนะ || "";
            const voiceText = (item.คันจิ || item.ฮิระงะนะ || "").replace(/'/g, "\\'");
            
            return `
                <div class="col-md-6 col-lg-4">
                    <div class="vocab-card shadow-sm">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <span class="badge bg-primary-subtle text-primary rounded-pill px-2" style="font-size:0.7rem">${item.หมวด || '-'}</span>
                            <button class="btn btn-sm btn-light rounded-circle shadow-sm" onclick="playVoice('${voiceText}')">
                                <i class="bi bi-volume-up-fill text-primary"></i>
                            </button>
                        </div>
                        <h4 class="fw-bold mb-1">${item.คันจิ || '-'}</h4>
                        <div class="hira-text mb-1">${hira} <small class="text-muted" style="font-weight:400">(${item.Romaji || ''})</small></div>
                        <div class="meaning-box">${item.ความหมายไทย || ''}</div>
                    </div>
                </div>`;
        }).join('');

        list.insertAdjacentHTML('beforeend', html);
        currentPage++;
        spinner.style.display = 'none';
    }

    function playVoice(t) {
        if(!t) return;
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'ja-JP'; 
        m.rate = 0.85;
        window.speechSynthesis.speak(m);
    }

    document.addEventListener('DOMContentLoaded', loadData);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
