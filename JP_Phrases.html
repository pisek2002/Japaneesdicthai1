    <style>
        :root {
            --jp-green: #2ecc71;
            --jp-dark: #2c3e50;
            --jp-light: #f4f7f6;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--jp-light);
            /* เว้นที่ว่างให้ประโยคอยู่กึ่งกลางพอดี */
            padding: 45vh 0; 
            overflow-x: hidden;
        }

        .kanit { font-family: 'Kanit', sans-serif; }

        .navbar {
            background-color: var(--jp-dark);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .phrase-container {
            width: 95%;
            max-width: 600px; /* ขนาดสูงสุดเมื่อดูบนคอมพิวเตอร์ */
            margin: 0 auto;
            padding: 0 15px;
        }

        /* ปรับขนาดพื้นฐานสำหรับหน้าจอทั่วไป */
        .phrase-card {
            background: white;
            border-radius: 25px;
            padding: 30px 20px; 
            margin-bottom: 40vh; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0.15;
            transform: scale(0.85);
            border: 2px solid transparent;
            width: 100%;
        }

        /* --- สไตล์เมื่อ Active (รองรับทุกอุปกรณ์) --- */
        .phrase-card.active {
            opacity: 1;
            transform: scale(1.05); /* บนมือถือขยายเล็กน้อยพอสวยงาม */
            border-color: var(--jp-green);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            z-index: 10;
        }

        /* --- ขนาดตัวอักษรมาตรฐาน --- */
        .thai-translation { font-weight: 600; color: #333; font-size: 1.2rem; margin-bottom: 8px; }
        .jp-text { color: var(--jp-dark); font-size: 2rem; font-weight: 700; margin-bottom: 5px; }
        .romaji-text { color: var(--jp-green); font-size: 1rem; font-weight: 600; margin-bottom: 8px; }
        .thai-reading { color: #888; font-size: 0.95rem; font-style: italic; }
        .speaker-icon { margin-top: 15px; color: #ddd; font-size: 1.5rem; }
        .active .speaker-icon { color: var(--jp-green); animation: pulse 1s infinite; }

        /* --- ปรับแต่งสำหรับหน้าจอคอมพิวเตอร์และแล็บท็อป (ขนาดใหญ่) --- */
        @media (min-width: 992px) {
            .phrase-card.active {
                transform: scale(1.25); /* ขยายใหญ่ขึ้นเมื่ออยู่บนจอคอม */
            }
            .thai-translation { font-size: 1.5rem; }
            .jp-text { font-size: 2.3rem; }
            .romaji-text { font-size: 1.3rem; }
            .thai-reading { font-size: 1.1rem; }
        }

        /* --- ปรับแต่งสำหรับมือถือขนาดเล็กมาก --- */
        @media (max-width: 400px) {
            .jp-text { font-size: 1.8rem; }
            .thai-translation { font-size: 1.1rem; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>

    const listContainer = document.getElementById('phrasesList');
    let lastPlayedIndex = -1;

    phrases.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'phrase-card';
        card.id = `phrase-${index}`;
        card.setAttribute('data-jp', item.jp);

        // ตรวจสอบ Romaji ป้องกัน undefined
        const romajiDisplay = item.romaji ? item.romaji : "";

        card.innerHTML = `
            <div class="thai-translation">${item.th}</div>
            <div class="jp-text">${item.jp}</div>
            <div class="romaji-text">${romajiDisplay}</div>
            <div class="thai-reading">อ่านว่า: ${item.reading}</div>
            <div class="speaker-icon">
                <i class="bi bi-volume-up-fill"></i>
            </div>
        `;
        listContainer.appendChild(card);
    });

    function playJPVoice(text) {
        if (!text) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ja-JP';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }

    function handleScroll() {
        const viewportCenter = window.innerHeight / 2;
        const cards = document.querySelectorAll('.phrase-card');
        let currentActiveIndex = -1;

        cards.forEach((card, index) => {
            const rect = card.getBoundingClientRect();
            const cardCenter = rect.top + (rect.height / 2);
            // ตรวจจับจุดที่ใกล้กึ่งกลางที่สุด
            if (Math.abs(cardCenter - viewportCenter) < 150) {
                currentActiveIndex = index;
            }
        });

        if (currentActiveIndex !== -1 && currentActiveIndex !== lastPlayedIndex) {
            cards.forEach(c => c.classList.remove('active'));
            const activeCard = cards[currentActiveIndex];
            activeCard.classList.add('active');
            playJPVoice(activeCard.getAttribute('data-jp'));
            lastPlayedIndex = currentActiveIndex;
        }
    }

    window.addEventListener('scroll', handleScroll);
    window.addEventListener('load', handleScroll);
</script>
