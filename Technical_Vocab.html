<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>คลังศัพท์เฉพาะทาง - Pisek Sensei</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f6f9; margin: 0; padding: 0; }
        .navbar { background-color: #2c313c; z-index: 2000; }

        /* ส่วนหัวและช่องค้นหา */
        .header-box {
            background: white; padding: 25px 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative; z-index: 1500;
        }
        .search-wrapper {
            max-width: 500px; margin: 0 auto;
            border: 2px solid #0d6efd; border-radius: 50px;
            overflow: hidden; background: white;
        }

        /* --- แถบเมนูหมวดหมู่แบบเลื่อนซ้าย-ขวา (Scrollable Tabs) --- */
        .tabs-sticky {
            position: sticky; top: 56px; /* เกาะขอบ Navbar */
            background: #ffffff; z-index: 1800;
            padding: 12px 0; border-bottom: 1px solid #eee;
        }
        
        .category-tabs {
            display: flex; 
            overflow-x: auto; /* เปิดการเลื่อนแนวนอน */
            overflow-y: hidden;
            white-space: nowrap; /* กันไม่ให้ปุ่มขึ้นบรรทัดใหม่ */
            gap: 12px; 
            padding: 5px 20px;
            -webkit-overflow-scrolling: touch; /* เลื่อนลื่นบน iOS */
            scrollbar-width: none; /* ซ่อน scrollbar (Firefox) */
        }
        
        /* ซ่อน scrollbar (Chrome/Safari) */
        .category-tabs::-webkit-scrollbar { display: none; }

        .tab-item {
            display: inline-block;
            padding: 10px 25px; 
            background: #f8f9fa;
            border: 2px solid #dee2e6; 
            color: #495057;
            border-radius: 50px; 
            font-weight: 700;
            cursor: pointer; 
            transition: all 0.2s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        .tab-item.active { 
            background: #0d6efd; 
            border-color: #0d6efd;
            color: white; 
            box-shadow: 0 4px 10px rgba(13,110,253,0.3); 
        }

        /* การ์ดคำศัพท์ */
        .vocab-card {
            background: white; border-radius: 15px; padding: 20px;
            border-left: 6px solid #0d6efd; height: 100%;
            box-shadow: 0 3px 10px rgba(0,0,0,0.03);
            transition: 0.3s;
        }
        .vocab-card:hover { transform: translateY(-3px); }
        .hira-text { color: #0d6efd; font-weight: 600; }
        .meaning-box { background: #f8f9fa; padding: 12px; border-radius: 10px; margin-top: 10px; border: 1px solid #eee; }

        #statusArea { font-weight: bold; color: #666; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark sticky-top shadow-sm">
    <div class="container d-flex align-items-center"> <div class="intro-content d-flex align-items-center">
            <img src="logo.jpg" alt="Logo" style="width: 40px; height: 40px; border-radius: 50%; margin-right: 10px;">
            
            <a class="navbar-brand fw-bold" href="index.html">TECHNICAL VOCAB</a>
        </div>
        <a href="index.html" class="btn btn-sm btn-outline-light rounded-pill ms-auto">กลับหน้าหลัก</a>
    </div>
</nav>
<div class="header-box text-center">
    <h4 class="fw-bold mb-3 text-dark">ศัพท์เฉพาะทาง (Technical Vocabulary) 60 หมวด มีคำศัพท์มากกว่า 60,000+คำ</h4>
    <div class="search-wrapper shadow-sm d-flex align-items-center">
        <span class="px-3"><i class="bi bi-search text-primary"></i></span>
        <input type="text" id="smartSearch" class="form-control border-0 shadow-none" 
               placeholder="ค้นหาคันจิ, คำอ่าน, ความหมาย..." onkeyup="filterData()">
    </div>
</div>

<div class="tabs-sticky">
    <div class="category-tabs" id="tabContainer">
        <div class="tab-item active" id="defaultTab" onclick="setTab('All', this)">ทั้งหมด</div>
    </div>
</div>

<div class="container py-4">
    <div id="statusArea" class="text-center py-5">
        <div class="spinner-border text-primary mb-2"></div>
        <p>กำลังโหลดข้อมูลคำศัพท์...</p>
    </div>
    <div class="row g-3" id="vocabList"></div>
</div>

<script>
    let vocabData = []; 
    let activeTab = 'All';

    async function loadData() {
        const status = document.getElementById('statusArea');
        try {
            const response = await fetch('technical_data.json');
            if (!response.ok) throw new Error();
            vocabData = await response.json();
            
            status.classList.add('d-none');
            renderTabs();
            filterData();
        } catch (e) {
            status.innerHTML = `<div class="alert alert-danger">ไม่พบไฟล์ technical_data.json หรือเกิดข้อผิดพลาดในการโหลด</div>`;
        }
    }

    function renderTabs() {
        const container = document.getElementById('tabContainer');
        // ดึงหมวดหมู่จาก JSON (คีย์ "หมวด")
        const categories = [...new Set(vocabData.map(item => item.หมวด))];
        
        categories.forEach(cat => {
            if(cat) {
                const div = document.createElement('div');
                div.className = 'tab-item';
                div.innerText = cat;
                div.onclick = function() { setTab(cat, this); };
                container.appendChild(div);
            }
        });
    }

    function setTab(cat, el) {
        activeTab = cat;
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        
        // ฟังก์ชันเลื่อนปุ่มที่เลือกมาไว้ตรงกลางจออัตโนมัติ (ช่วยให้รู้ว่ามีเมนูถัดไป)
        el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        
        filterData();
    }

    function filterData() {
        const query = document.getElementById('smartSearch').value.toLowerCase().trim();
        const filtered = vocabData.filter(item => {
            const matchTab = (activeTab === 'All' || item.หมวด === activeTab);
            const textContent = (item.คันจิ || '') + (item.ฮิระงะนะ || '') + (item.ความหมายไทย || '') + (item.Romaji || '');
            return matchTab && textContent.toLowerCase().includes(query);
        });
        renderCards(filtered);
    }

    function renderCards(data) {
        const list = document.getElementById('vocabList');
        list.innerHTML = data.length ? '' : '<div class="text-center py-5 w-100 text-muted">ไม่พบคำศัพท์ที่ค้นหา</div>';
        
        data.forEach(item => {
            const hira = item.ฮิระงะนะ || "";
            const card = `
                <div class="col-md-6 col-lg-4">
                    <div class="vocab-card shadow-sm">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <span class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill px-3" style="font-size:0.75rem">${item.หมวด || '-'}</span>
                            <button class="btn btn-light rounded-circle shadow-sm" onclick="playVoice('${hira}')">
                                <i class="bi bi-volume-up-fill text-primary"></i>
                            </button>
                        </div>
                        <h4 class="fw-bold mb-1">${item.คันจิ || '-'}</h4>
                        <div class="hira-text mb-1">${hira} <small class="text-muted" style="font-weight:400">(${item.Romaji || ''})</small></div>
                        <div class="meaning-box fw-bold text-dark">${item.ความหมายไทย || ''}</div>
                    </div>
                </div>`;
            list.insertAdjacentHTML('beforeend', card);
        });
    }

    function playVoice(t) {
        if(!t) return;
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'ja-JP'; m.rate = 0.85;
        window.speechSynthesis.speak(m);
    }

    document.addEventListener('DOMContentLoaded', loadData);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
