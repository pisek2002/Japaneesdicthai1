<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คันจิอัจฉริยะ (Smart History) - Pisek Sensei</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f4f8; }
        .navbar { background-color: #2c313c; }
        .jp-font { font-family: 'Noto Sans JP', sans-serif; }
        
        .search-area {
            background: white; border-radius: 25px; padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 30px;
        }

        #multiInput { font-size: 1.4rem; height: 60px; padding-left: 20px; border-width: 2px; }

        .kanji-result-container {
            display: flex; flex-direction: row; flex-wrap: wrap;
            justify-content: center; gap: 15px; padding-bottom: 20px;
        }

        .kanji-card {
            background: white; border-radius: 20px; padding: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06); 
            width: 260px; text-align: center; border-top: 6px solid #198754;
            transition: 0.3s; animation: fadeIn 0.5s ease-out;
        }

        .kanji-main-char { font-size: 4rem; font-weight: 800; margin-bottom: 0; line-height: 1.1; }

        .stroke-box {
            width: 180px; height: 180px; margin: 10px auto; border: 2px dashed #198754; 
            border-radius: 15px; display: flex; align-items: center; justify-content: center; background: #fff;
        }
        .stroke-img { width: 90%; height: 90%; }

        .info-section { 
            text-align: left; background: #f8fdfa; padding: 12px;
            border-radius: 12px; border-left: 4px solid #198754;
        }
        .info-label { font-size: 0.85rem; font-weight: 800; color: #198754; text-transform: uppercase; }
        .info-text { font-size: 1.1rem; color: #333; line-height: 1.4; margin-bottom: 8px; }
        .on-text { color: #d63384; } /* สีชมพูเข้มสำหรับ Onyomi */
        .kun-text { color: #0d6efd; } /* สีน้ำเงินสำหรับ Kunyomi */
        .meaning-text { font-size: 1.1rem; color: #1b5e20; font-weight: 600; }

        .history-divider { position: relative; text-align: center; margin: 50px 0; }
        .history-divider::before {
            content: ""; position: absolute; top: 50%; left: 0; right: 0;
            height: 2px; background: #dee2e6; z-index: 1;
        }
        .history-label {
            position: relative; z-index: 2; background: #f0f4f8; padding: 0 20px;
            font-weight: 700; color: #6c757d;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand" href="index.html"><i class="bi bi-house-door-fill me-2"></i> หน้าหลัก</a>
        <span class="navbar-text text-white fw-bold">Pisek Kanji Smart Dictionary</span>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-12">
            
            <div class="search-area text-center shadow-sm">
                <h3 class="fw-bold mb-4 text-success">ค้นหาคันจิ & ระบบอ่านเสียงอัจฉริยะ</h3>
                <div class="input-group mb-3" style="max-width: 600px; margin: 0 auto;">
                    <input type="text" id="multiInput" class="form-control rounded-start-pill border-success shadow-none" placeholder="พิมพ์คันจิ (เช่น 日本語)">
                    <button class="btn btn-success rounded-end-pill px-4 fw-bold" onclick="generatePractice()">
                        ค้นหา <i class="bi bi-search ms-1"></i>
                    </button>
                </div>
                <div id="loader" class="d-none mt-2">
                    <div class="spinner-border spinner-border-sm text-success" role="status"></div>
                    <span class="ms-2 small text-muted">กำลังดึงข้อมูลไวยากรณ์...</span>
                </div>
            </div>

            <div id="currentSearchContainer" class="d-none">
                <h4 class="text-center mb-4"><span class="badge bg-success rounded-pill px-4 py-2 shadow-sm" id="currentCountLabel">การค้นหาครั้งที่ 1</span></h4>
                <div id="currentResult" class="kanji-result-container"></div>
            </div>

            <div id="historyDivider" class="history-divider d-none">
                <span class="history-label">ประวัติการเรียนรู้ก่อนหน้า</span>
            </div>

            <div id="searchHistory"></div>

        </div>
    </div>
</div>

<script>
    let searchCounter = 0;

    async function generatePractice() {
        const input = document.getElementById('multiInput');
        const text = input.value.trim();
        if (!text) return;

        const currentArea = document.getElementById('currentResult');
        const historyArea = document.getElementById('searchHistory');
        const currentContainer = document.getElementById('currentSearchContainer');
        const historyDivider = document.getElementById('historyDivider');
        const loader = document.getElementById('loader');

        // 1. เก็บประวัติเดิม
        if (currentArea.innerHTML !== '') {
            const historyBlock = document.createElement('div');
            historyBlock.className = 'mb-5 opacity-75';
            historyBlock.innerHTML = `
                <h5 class="text-center mb-3 text-secondary">การค้นหาครั้งที่ ${searchCounter} (ประวัติ)</h5>
                <div class="kanji-result-container">${currentArea.innerHTML}</div>
            `;
            historyArea.prepend(historyBlock);
            historyDivider.classList.remove('d-none');
        }

        // 2. เริ่มการค้นหาใหม่
        searchCounter++;
        loader.classList.remove('d-none');
        currentContainer.classList.remove('d-none');
        document.getElementById('currentCountLabel').innerText = `การค้นหาครั้งที่ ${searchCounter}`;
        currentArea.innerHTML = ''; 
        
        let found = false;

        for (let char of text) {
            const code = char.charCodeAt(0);
            if (code >= 0x4E00 && code <= 0x9FAF) {
                found = true;
                const hex = code.toString(16).padStart(5, '0');
                const data = await getKanjiFullInfo(char);
                
                const cardHTML = `
                    <div class="kanji-card shadow-sm">
                        <div class="kanji-main-char text-success jp-font">${char}</div>
                        <div class="stroke-box">
                            <img src="https://raw.githubusercontent.com/kanjivg/kanjivg/master/kanji/${hex}.svg" class="stroke-img">
                        </div>
                        <div class="info-section">
                            <div class="info-label">ความหมาย (Meanings)</div>
                            <div class="meaning-text mb-2 text-truncate">${data.meaning}</div>
                            <div class="info-label">音読み (Onyomi)</div>
                            <div class="info-text small on-text jp-font">${data.on.join('、 ') || '-'}</div>
                            <div class="info-label">訓読み (Kunyomi)</div>
                            <div class="info-text small kun-text jp-font">${data.kun.join('、 ') || '-'}</div>
                        </div>
                    </div>
                `;
                currentArea.insertAdjacentHTML('beforeend', cardHTML);
            }
        }

        loader.classList.add('d-none');
        
        // **ปรับปรุงการอ่านเสียง**: เว้นวรรคระหว่างตัวอักษรเพื่อให้ AI อ่านแบบแยกตัว (ช่วย Kunyomi) 
        // แต่ถ้าเป็นคำประสม AI จะพยายามอ่านแบบประสม (Onyomi) ตามหลักไวยากรณ์
        if(found) playVoice(text); 
        
        input.value = ''; 
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function getKanjiFullInfo(kanji) {
        try {
            const response = await fetch(`https://kanjiapi.dev/v1/kanji/${kanji}`);
            const data = await response.json();
            return {
                on: data.on_readings || [],
                kun: data.kun_readings || [],
                meaning: data.meanings ? data.meanings.slice(0, 3).join(', ') : 'ไม่พบข้อมูล'
            };
        } catch (e) {
            return { on: [], kun: [], meaning: 'ไม่พบข้อมูลในระบบ' };
        }
    }

    function playVoice(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ja-JP';
            msg.rate = 0.75; // ช้าลงเล็กน้อยเพื่อให้ฟัง Accent (เสียงสูงต่ำ) ชัดเจน
            
            // เลือกเสียงที่ดีที่สุดในเครื่อง (Google หรือ Premium Voice)
            const voices = window.speechSynthesis.getVoices();
            const jaVoice = voices.find(v => v.lang === 'ja-JP' && v.name.includes('Google')) || 
                           voices.find(v => v.lang === 'ja-JP');
            if (jaVoice) msg.voice = jaVoice;

            window.speechSynthesis.speak(msg);
        }
    }

    // แก้ไขปัญหา Chrome โหลดเสียงไม่ทัน
    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
