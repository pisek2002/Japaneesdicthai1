<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฝึกเขียน & ฟังเสียง Katakana (Full) - Pisek Sensei</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f9; }
        .navbar { background-color: #2c313c; }
        
        .char-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        .char-btn {
            aspect-ratio: 1;
            border: 2px solid #eee;
            background: white;
            border-radius: 12px;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .char-btn:hover { border-color: #0d6efd; color: #0d6efd; background: #f0f7ff; }
        .char-btn.active { background: #0d6efd; color: white; border-color: #0d6efd; box-shadow: 0 4px 12px rgba(13, 110, 253, 0.3); }
        .char-btn.empty { background: transparent; border: none; cursor: default; }

        .practice-card {
            background: white;
            border-radius: 25px;
            padding: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
            position: sticky;
            top: 90px;
        }
        .display-char-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 5px;
        }
        .stroke-box {
            width: 260px;
            height: 260px;
            margin: 20px auto;
            border: 2px dashed #0d6efd;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }
        .stroke-img { width: 90%; height: 90%; object-fit: contain; }
        
        .section-title {
            border-left: 5px solid #0d6efd;
            padding-left: 15px;
            margin: 30px 0 20px;
            font-weight: 700;
            color: #2c313c;
        }

        @media (max-width: 991px) {
            .practice-card { position: relative; top: 0; margin-top: 25px; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <i class="bi bi-arrow-left-circle me-2"></i> กลับหน้าหลัก
        </a>
        <span class="navbar-text text-white fw-bold">Katakana Practice & Voice</span>
    </div>
</nav>

<div class="container py-4">
    <div class="row">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm p-4 rounded-4">
                <h5 class="fw-bold mb-4 text-secondary">คลิกตัวคาตาคะนะเพื่อฟังเสียงและดูลำดับเส้น</h5>
                
                <h6 class="section-title">เสียงพื้นฐาน (Seion)</h6>
                <div class="char-grid" id="kataGrid"></div>

                <h6 class="section-title">เสียงขุ่น (Dakuon / Handakuon)</h6>
                <div class="char-grid" id="dakuonGrid"></div>

                <h6 class="section-title">เสียงควบ (Yoon)</h6>
                <div class="char-grid" id="yoonGrid"></div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="practice-card">
                <div class="display-char-section">
                    <h1 id="currentChar" class="display-1 fw-bold mb-0">ア</h1>
                    <button class="btn btn-light btn-speak text-primary shadow-sm" onclick="playVoice()" title="ฟังเสียง">
                        <i class="bi bi-volume-up-fill"></i>
                    </button>
                </div>
                <p id="romajiInfo" class="text-muted fs-5 mb-3">A (อะ)</p>
                
                <div class="stroke-box shadow-sm">
                    <img id="strokeImg" src="https://raw.githubusercontent.com/kanjivg/kanjivg/master/kanji/030a2.svg" class="stroke-img">
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button class="btn btn-primary rounded-pill py-2 fw-bold" onclick="reloadStroke()">
                        <i class="bi bi-pencil-square me-2"></i> ดูลำดับเส้นอีกครั้ง
                    </button>
                    <p class="small text-muted mt-2">
                        <i class="bi bi-info-circle me-1"></i> เสียงจะออกโดยอัตโนมัติเมื่อเลือกตัวอักษร
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const katakanaData = [
        {c:'ア', r:'a', u:'030a2'}, {c:'イ', r:'i', u:'030a4'}, {c:'ウ', r:'u', u:'030a6'}, {c:'エ', r:'e', u:'030a8'}, {c:'オ', r:'o', u:'030aa'},
        {c:'カ', r:'ka', u:'030ab'}, {c:'キ', r:'ki', u:'030ad'}, {c:'ク', r:'ku', u:'030af'}, {c:'ケ', r:'ke', u:'030b1'}, {c:'コ', r:'ko', u:'030b3'},
        {c:'サ', r:'sa', u:'030b5'}, {c:'シ', r:'shi', u:'030b7'}, {c:'ス', r:'su', u:'030b9'}, {c:'セ', r:'se', u:'030bb'}, {c:'ソ', r:'so', u:'030bd'},
        {c:'タ', r:'ta', u:'030bf'}, {c:'チ', r:'chi', u:'030c1'}, {c:'ツ', r:'tsu', u:'030c4'}, {c:'て', r:'te', u:'03066'}, {c:'ト', r:'to', u:'030c8'},
        {c:'ナ', r:'na', u:'030ca'}, {c:'ニ', r:'ni', u:'030cb'}, {c:'ヌ', r:'nu', u:'030cc'}, {c:'ネ', r:'ne', u:'030ce'}, {c:'ノ', r:'no', u:'030ce'},
        {c:'ハ', r:'ha', u:'030cf'}, {c:'ヒ', r:'hi', u:'030d2'}, {c:'フ', r:'fu', u:'030d5'}, {c:'ヘ', r:'he', u:'030d8'}, {c:'ホ', r:'ho', u:'030db'},
        {c:'マ', r:'ma', u:'030de'}, {c:'มิ', r:'mi', u:'030df'}, {c:'ム', r:'mu', u:'030e0'}, {c:'เม', r:'me', u:'030e1'}, {c:'モ', r:'mo', u:'030e2'},
        {c:'ヤ', r:'ya', u:'030e4'}, {c:' ', r:'', u:''}, {c:'ユ', r:'yu', u:'030e6'}, {c:' ', r:'', u:''}, {c:'ヨ', r:'yo', u:'030e8'},
        {c:'ラ', r:'ra', u:'030e9'}, {c:'リ', r:'ri', u:'030ea'}, {c:'ル', r:'ru', u:'030eb'}, {c:'レ', r:'re', u:'030ec'}, {c:'ロ', r:'ro', u:'030ed'},
        {c:'ワ', r:'wa', u:'030ef'}, {c:' ', r:'', u:''}, {c:' ', r:'', u:''}, {c:' ', r:'', u:''}, {c:'ヲ', r:'wo', u:'030f2'},
        {c:'ン', r:'n', u:'030f3'}
    ];

    const dakuonData = [
        {c:'ガ', r:'ga', u:'030ac'}, {c:'ギ', r:'gi', u:'030ae'}, {c:'グ', r:'gu', u:'030b0'}, {c:'ゲ', r:'ge', u:'030b2'}, {c:'ゴ', r:'go', u:'030b4'},
        {c:'ザ', r:'za', u:'030b6'}, {c:'ジ', r:'ji', u:'030b8'}, {c:'ズ', r:'zu', u:'030ba'}, {c:'ゼ', r:'ze', u:'030bc'}, {c:'ゾ', r:'zo', u:'030be'},
        {c:'ダ', r:'da', u:'030c0'}, {c:'ヂ', r:'ji', u:'030c2'}, {c:'ヅ', r:'zu', u:'030c5'}, {c:'デ', r:'de', u:'030c7'}, {c:'ド', r:'do', u:'030c9'},
        {c:'バ', r:'ba', u:'030d0'}, {c:'ビ', r:'bi', u:'030d3'}, {c:'ブ', r:'bu', u:'030d6'}, {c:'ベ', r:'be', u:'030d9'}, {c:'ボ', r:'bo', u:'030dc'},
        {c:'パ', r:'pa', u:'030d1'}, {c:'ピ', r:'pi', u:'030d4'}, {c:'プ', r:'pu', u:'030d7'}, {c:'ペ', r:'pe', u:'030da'}, {c:'ポ', r:'po', u:'030dd'}
    ];

    const yoonData = [
        {c:'キャ', r:'kya', u:'030ad'}, {c:'キュ', r:'kyu', u:'030ad'}, {c:'キョ', r:'kyo', u:'030ad'},
        {c:'シャ', r:'sha', u:'030b7'}, {c:'シュ', r:'shu', u:'030b7'}, {c:'ショ', r:'sho', u:'030b7'},
        {c:'チャ', r:'cha', u:'030c1'}, {c:'チュ', r:'chu', u:'030c1'}, {c:'チョ', r:'cho', u:'030c1'},
        {c:'ニャ', r:'nya', u:'030cb'}, {c:'ニュ', r:'nyu', u:'030cb'}, {c:'ニョ', r:'nyo', u:'030cb'},
        {c:'ヒャ', r:'hya', u:'030d2'}, {c:'ヒュ', r:'hyu', u:'030d2'}, {c:'ヒョ', r:'hyo', u:'030d2'},
        {c:'ミャ', r:'mya', u:'030df'}, {c:'ミュ', r:'myu', u:'030df'}, {c:'ミョ', r:'myo', u:'030df'},
        {c:'リャ', r:'rya', u:'030ea'}, {c:'リュ', r:'ryu', u:'030ea'}, {c:'リョ', r:'ryo', u:'030ea'},
        {c:'ギャ', r:'gya', u:'030ae'}, {c:'ギュ', r:'gyu', u:'030ae'}, {c:'ギョ', r:'gyo', u:'030ae'},
        {c:'ジャ', r:'ja', u:'030b8'}, {c:'ジュ', r:'ju', u:'030b8'}, {c:'ジョ', r:'jo', u:'030b8'},
        {c:'ビャ', r:'bya', u:'030d3'}, {c:'ビュ', r:'byu', u:'030d3'}, {c:'ビョ', r:'byo', u:'030d3'},
        {c:'ピャ', r:'pya', u:'030d4'}, {c:'ピュ', r:'pyu', u:'030d4'}, {c:'ピョ', r:'pyo', u:'030d4'}
    ];

    const strokeImg = document.getElementById('strokeImg');
    const charDisplay = document.getElementById('currentChar');
    const romajiInfo = document.getElementById('romajiInfo');

    function createButtons(data, containerId) {
        const container = document.getElementById(containerId);
        data.forEach(item => {
            const btn = document.createElement('div');
            if (item.c === ' ') {
                btn.className = 'char-btn empty';
            } else {
                btn.className = 'char-btn shadow-sm';
                btn.innerText = item.c;
                btn.onclick = () => selectChar(item, btn);
            }
            container.appendChild(btn);
        });
    }

    createButtons(katakanaData, 'kataGrid');
    createButtons(dakuonData, 'dakuonGrid');
    createButtons(yoonData, 'yoonGrid');

    function selectChar(item, btn) {
        document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        charDisplay.innerText = item.c;
        romajiInfo.innerText = `${item.r.toUpperCase()} (${getThaiRead(item.r)})`;
        strokeImg.src = `https://raw.githubusercontent.com/kanjivg/kanjivg/master/kanji/${item.u}.svg`;
        
        playVoice();
    }

    function playVoice() {
        const text = charDisplay.innerText;
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ja-JP';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }
    }

    function getThaiRead(r) {
        const map = {
            'a':'อะ','i':'อิ','u':'อุ','e':'เอ','o':'โอะ','ka':'คะ','ki':'คิ','ku':'คุ','ke':'เค','ko':'โคะ','sa':'สะ','shi':'ชิ','su':'สุ','se':'เสะ','so':'โสะ','ta':'ตะ','chi':'จิ','tsu':'สึ','te':'เตะ','to':'โตะ','na':'นะ','ni':'นิ','nu':'นุ','ne':'เนะ','no':'โนะ','ha':'ฮะ','hi':'ฮิ','fu':'ฟุ','he':'เฮะ','ho':'โฮะ','ma':'มะ','mi':'มิ','mu':'มุ','me':'เมะ','mo':'โมะ','ya':'ยะ','yu':'ยุ','yo':'โยะ','ra':'ระ','ri':'ริ','ru':'รุ','re':'เระ','ro':'โระ','wa':'วะ','wo':'โอะ','n':'อึน',
            'ga':'กะ','gi':'กิ','gu':'กุ','ge':'เกะ','go':'โกะ','za':'ซะ','ji':'จิ','zu':'ซุ','ze':'เซะ','zo':'โซะ','da':'ดะ','de':'เดะ','do':'โดะ','ba':'บะ','bi':'บิ','bu':'บุ','be':'เบะ','bo':'โบะ','pa':'พะ','pi':'พิก','pu':'พุ','pe':'เปะ','po':'โพระ',
            'kya':'เคียะ','kyu':'คิว','kyo':'เคียว','sha':'ชะ','shu':'ชุ','sho':'โช','cha':'จะ','chu':'จุ','cho':'โจ','nya':'เนียะ','nyu':'นิว','nyo':'เนียว','hya':'เฮียะ','hyu':'ฮิว','hyo':'เฮียว','mya':'เมียะ','myu':'มิว','myo':'เมียว','rya':'เรียะ','ryu':'ริว','ryo':'เรียว','gya':'เกียะ','gyu':'กิว','gyo':'เกียว','ja':'จะ','ju':'จุ','jo':'โจ','bya':'เบียะ','byu':'บิว','byo':'เบียว','pya':'เพียะ','pyu':'พิว','pyo':'เพียว'
        };
        return map[r] || r;
    }

    function reloadStroke() {
        const src = strokeImg.src;
        strokeImg.src = '';
        setTimeout(() => strokeImg.src = src, 50);
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
