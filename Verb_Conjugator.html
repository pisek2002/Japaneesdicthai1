<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pisek Verb AI - Professional Edition</title>
    
    <!-- CSS Frameworks -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Kanit:wght@500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #e63946;
            --secondary-color: #1d3557;
            --accent-color: #457b9d;
            --light-bg: #f8f9fa;
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: #333;
        }

        .kanit { font-family: 'Kanit', sans-serif; }

        .navbar {
            background-color: var(--secondary-color);
            padding: 12px 0;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        .main-card {
            background: var(--glass-bg);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            margin-top: 40px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .btn-action {
            background: linear-gradient(45deg, var(--primary-color), #f76c6c);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 15px 30px;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(230, 57, 70, 0.3); }

        .result-box {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 35px;
            margin-top: 35px;
            border-left: 8px solid var(--primary-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .verb-kanji { font-size: 3.8rem; font-weight: 700; color: var(--primary-color); line-height: 1.1; }
        .verb-hira { font-size: 1.8rem; color: var(--secondary-color); font-weight: 500; margin-bottom: 20px; }
        .meaning-badge { background-color: #fff1f2; color: var(--primary-color); padding: 12px 25px; border-radius: 50px; font-weight: 600; display: inline-block; border: 1px solid rgba(230, 57, 70, 0.1); }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .info-item label { display: block; font-size: 0.8rem; color: #999; margin-bottom: 5px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark sticky-top">
    <div class="container d-flex align-items-center">
        <a class="navbar-brand kanit d-flex align-items-center" href="#">
            <i class="bi bi-translate me-2"></i> Pisek Verb AI
        </a>
        <a href="index.html" class="btn btn-outline-light btn-sm rounded-pill px-4 transition">
            <i class="bi bi-house-door me-1"></i> กลับหน้าแรก
        </a>
    </div>
</nav>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-8">
            <div class="main-card animate-fadeIn text-center">
                <h3 class="kanit mb-4">ระบบผันกริยาอัจฉริยะ</h3>
                
                <div id="dbStatus" class="alert alert-light border py-2 mb-4 rounded-pill small text-secondary">
                    กำลังเตรียมฐานข้อมูล...
                </div>

                <div class="row g-4 text-start">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">พิมพ์คำกริยา (คันจิ/ฮิระงะนะ)</label>
                        <input type="text" id="inputVerb" class="form-control" placeholder="เช่น 食べる, 立つ, 行く">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">เลือกรูปแบบการผัน</label>
                        <select id="conjugationForm" class="form-select">
                            <optgroup label="รูปพื้นฐาน">
                                <option value="masu">รูปสุภาพ (〜ます)</option>
                                <option value="mashou">รูปเชิญชวน (〜ましょう)</option>
                                <option value="nai">รูปปฏิเสธ (〜ない)</option>
                                <option value="te">รูปเตะ (〜て)</option>
                                <option value="ta">รูปอดีต (〜た)</option>
                                <option value="tai">รูปอยาก (〜たい)</option>
                            </optgroup>
                            <optgroup label="เงื่อนไข & ตั้งใจ">
                                <option value="ba">รูปเงื่อนไข (〜ば)</option>
                                <option value="tara">รูปเงื่อนไข (〜たら)</option>
                                <option value="to">รูปเงื่อนไข (〜と)</option>
                                <option value="ikou">รูปตั้งใจ (〜おう/よう)</option>
                            </optgroup>
                            <optgroup label="ประสม & ความรู้สึก">
                                <option value="teiru">กำลัง... (〜ている)</option>
                                <option value="teshimau">...เสียแล้ว (〜てしまう)</option>
                                <option value="takunai">ไม่อยาก... (〜たくない)</option>
                                <option value="must_inf">จำเป็นต้อง (〜なければならない)</option>
                                <option value="te_kudasai">กรุณา... (〜てください)</option>
                            </optgroup>
                        </select>
                    </div>
                </div>

                <button class="btn btn-action" onclick="conjugate()">
                    ผันกริยาและแปลความหมาย <i class="bi bi-magic ms-2"></i>
                </button>
            </div>

            <div id="resultArea" class="result-box text-center">
                <div class="d-flex justify-content-between align-items-start mb-4">
                    <span class="badge bg-light text-dark border rounded-pill px-3 py-2" id="displayGroup">กริยากลุ่ม -</span>
                    <button class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="playVoice()">
                        <i class="bi bi-volume-up-fill me-1"></i> ฟังเสียง
                    </button>
                </div>
                <div id="displayResultKanji" class="verb-kanji"></div>
                <div id="displayResultHira" class="verb-hira"></div>
                <div class="meaning-badge"><span id="displayMeaning">-</span></div>
                <div class="info-grid">
                    <div class="info-item border-end"><label>Onyomi</label><span id="displayOn">-</span></div>
                    <div class="info-item"><label>Kunyomi</label><span id="displayKun">-</span></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let verbDatabase = [];

    async function loadData() {
        try {
            const response = await fetch('Verb_Conjugator.json?t=' + Date.now());
            verbDatabase = await response.json();
            document.getElementById('dbStatus').innerHTML = '<i class="bi bi-check-circle-fill text-success"></i> ฐานข้อมูลพร้อมใช้งาน';
        } catch (e) {
            document.getElementById('dbStatus').innerHTML = '<i class="bi bi-x-circle-fill text-danger"></i> โหลดข้อมูลไม่สำเร็จ';
        }
    }

    function getVerbGroup(hira) {
        if (hira.endsWith("する") || hira === "くる") return 3;
        const v2_rules = ["える", "ける", "せる", "てる", "ねる", "める", "れる", "べる", "いる", "きる", "しる", "ちる", "にる", "ひる", "みる", "りる"];
        if (hira.endsWith("る") && v2_rules.includes(hira.slice(-2))) return 2;
        return 1;
    }

    function conjugate() {
        const input = document.getElementById('inputVerb').value.trim();
        const form = document.getElementById('conjugationForm').value;
        const item = verbDatabase.find(v => v.คันจิ === input || v.ฮิระงะนะ === input);

        if (!item) { alert("ไม่พบข้อมูลกริยา"); return; }

        const kanjiStem = item.คันจิ;
        const hiraStem = item.ฮิระงะนะ;
        const group = getVerbGroup(hiraStem);

        // Unicode Mappings
        const uToA = { "う":"わ", "く":"か", "ぐ":"が", "す":"さ", "つ":"た", "ぬ":"な", "ぶ":"ば", "む":"ま", "る":"ら" };
        const uToI = { "う":"い", "く":"き", "ぐ":"ぎ", "す":"し", "つ":"ち", "ぬ":"に", "ぶ":"び", "む":"み", "る":"り" };
        const uToE = { "う":"え", "く":"け", "ぐ":"げ", "す":"せ", "つ":"て", "ぬ":"เน", "ぶ":"เบ", "む":"เม", "る":"れ" };
        const uToO = { "う":"おう", "く":"こう", "ぐ":"ごう", "す":"そう", "つ":"とう", "ぬ":"のう", "ぶ":"ぼう", "む":"もう", "る":"ろう" };

        function applyRule(stem, dict) {
            const base = stem.slice(0, -1);
            const last = dict.slice(-1);
            
            // Logic for Te & Ta Form
            const getTeTa = (type) => {
                const teMap = { "う":"って", "つ":"って", "る":"って", "ぬ":"んで", "ぶ":"んで", "む":"んで", "く":"いて", "ぐ":"いで", "す":"して" };
                const taMap = { "う":"った", "つ":"った", "る":"った", "ぬ":"んだ", "ぶ":"んだ", "む":"んだ", "く":"いた", "ぐ":"いだ", "す":"した" };
                if (group === 3) return dict === "くる" ? (type === 'te' ? "きて" : "きた") : stem.replace("する", type === 'te' ? "して" : "した");
                if (group === 2) return base + (type === 'te' ? "て" : "た");
                if (dict === "いく") return type === 'te' ? "いって" : "いった";
                return base + (type === 'te' ? teMap[last] : taMap[last]);
            };

            switch(form) {
                case "masu": 
                    if (group === 3) return dict === "くる" ? "きます" : stem.replace("する", "します");
                    return (group === 2 ? base : base + uToI[last]) + "ます";
                case "mashou": 
                    if (group === 3) return dict === "くる" ? "きましょう" : stem.replace("する", "しましょう");
                    return (group === 2 ? base : base + uToI[last]) + "ましょう";
                case "nai":
                    if (group === 3) return dict === "くる" ? "こない" : stem.replace("する", "しない");
                    return (group === 2 ? base : base + uToA[last]) + "ない";
                case "te": return getTeTa('te');
                case "ta": return getTeTa('ta');
                case "tai":
                    if (group === 3) return dict === "くる" ? "きたい" : stem.replace("する", "したい");
                    return (group === 2 ? base : base + uToI[last]) + "たい";
                case "ba":
                    if (group === 3) return dict === "くる" ? "くれば" : stem.replace("する", "すれば");
                    return (group === 2 ? base + "れば" : base + uToE[last] + "บา");
                case "tara": return getTeTa('ta') + "ら";
                case "to": return dict + "と";
                case "ikou":
                    if (group === 3) return dict === "くる" ? "こよう" : stem.replace("する", "しよう");
                    return group === 2 ? base + "よう" : base + uToO[last];
                case "teiru": return getTeTa('te') + "いる";
                case "teshimau": return getTeTa('te') + "しまう";
                case "takunai":
                    if (group === 3) return dict === "くる" ? "きたくない" : stem.replace("する", "したくない");
                    return (group === 2 ? base : base + uToI[last]) + "たくない";
                case "must_inf":
                    if (group === 3) return dict === "くる" ? "こなければならない" : stem.replace("する", "しなければならない");
                    return (group === 2 ? base : base + uToA[last]) + "なければならない";
                case "te_kudasai": return getTeTa('te') + "ください";
                default: return stem;
            }
        }

        const mS = { 
            masu:" (รูปสุภาพ)", mashou:" ...กันเถอะ", nai:"ไม่...", te:"และ/โดย...", ta:"แล้ว", 
            tai:"อยาก...", ba:"ถ้า...", tara:"ถ้า...แล้ว", to:"พอ...ก็", ikou: "ตั้งใจว่า...",
            teiru:"กำลัง...", teshimau:"...เสียแล้ว", takunai:"ไม่อยาก...", must_inf: "ต้อง...", te_kudasai: "กรุณา..."
        };
        
        let finalM = item.ความหมายไทย;
        if(["nai", "takunai", "must_inf", "te_kudasai"].includes(form)) finalM = mS[form].replace("...", finalM);
        else finalM = finalM + (mS[form] || "");

        document.getElementById('resultArea').style.display = "block";
        document.getElementById('displayResultKanji').innerText = applyRule(kanjiStem, hiraStem);
        document.getElementById('displayResultHira').innerText = applyRule(hiraStem, hiraStem);
        document.getElementById('displayMeaning').innerText = finalM;
        document.getElementById('displayGroup').innerText = `กริยากลุ่ม ${group}`;
        document.getElementById('displayOn').innerText = item.Onyomi || '-';
        document.getElementById('displayKun').innerText = item.Kunyomi || '-';
        
        setTimeout(() => { document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 100);
    }

    function playVoice() {
        const text = document.getElementById('displayResultHira').innerText;
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(text);
        m.lang = 'ja-JP'; m.rate = 0.85;
        window.speechSynthesis.speak(m);
    }
    document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
