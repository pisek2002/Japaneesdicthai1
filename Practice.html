<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฝึกเขียน & ฟังเสียง Hiragana - Pisek Sensei</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f9; }
        .navbar { background-color: #2c313c; }
        
        .section-title {
            border-left: 5px solid #dc3545;
            padding-left: 15px;
            margin: 30px 0 20px;
            font-weight: 700;
            color: #2c313c;
        }

        /* Grid ตารางตัวอักษร */
        .char-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        .char-btn {
            aspect-ratio: 1;
            border: 2px solid #eee;
            background: white;
            border-radius: 12px;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .char-btn:hover { border-color: #dc3545; color: #dc3545; background: #fff5f5; }
        .char-btn.active { background: #dc3545; color: white; border-color: #dc3545; }
        .char-btn.empty { background: transparent; border: none; cursor: default; }

        /* Practice Card & Drawing Area */
        .practice-card {
            background: white;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
            position: sticky;
            top: 90px;
        }
        .stroke-box {
            width: 200px;
            height: 200px;
            margin: 15px auto;
            border: 2px dashed #eee;
            border-radius: 15px;
            display: flex;
            align-items: center; justify-content: center;
        }
        .stroke-img { width: 90%; height: 90%; object-fit: contain; }

        /* Canvas Drawing Pad */
        .drawing-area { 
            margin-top: 20px; 
            padding-top: 20px; 
            border-top: 1px solid #eee; 
        }
        .canvas-container {
            width: 250px;
            height: 250px;
            margin: 0 auto;
            background-color: #fff;
            border: 3px solid #f8f9fa;
            border-radius: 15px;
            touch-action: none;
            cursor: crosshair;
            background-image: 
                linear-gradient(#f0f0f0 1.5px, transparent 1.5px),
                linear-gradient(90deg, #f0f0f0 1.5px, transparent 1.5px);
            background-size: 125px 125px;
            background-position: center;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        @media (max-width: 991px) {
            .practice-card { position: relative; top: 0; margin-top: 30px; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark shadow-sm sticky-top">
    <div class="container">
       <a href="index.html" class="btn btn-outline-light rounded-pill px-4">กลับหน้าหลัก</a>
        </a>
        <span class="navbar-text text-white fw-bold">Hiragana Practice & Drawing Pad</span>
    </div>
</nav>

<div class="container py-4">
    <div class="row">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm p-4 rounded-4">
                <h6 class="section-title">เสียงพื้นฐาน (Seion)</h6>
                <div class="char-grid" id="hiraGrid"></div>

                <h6 class="section-title">เสียงขุ่น (Dakuon)</h6>
                <div class="char-grid" id="dakuonGrid"></div>

                <h6 class="section-title">เสียงควบ (Yoon)</h6>
                <div class="char-grid" id="yoonGrid"></div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="practice-card">
                <div class="d-flex align-items: center justify-content-center gap-3">
                    <h1 id="currentChar" class="display-2 fw-bold mb-0 text-danger">あ</h1>
                    <button class="btn btn-light rounded-circle shadow-sm text-danger" onclick="playVoice()">
                        <i class="bi bi-volume-up-fill fs-4"></i>
                    </button>
                </div>
                <p id="romajiInfo" class="text-muted fs-5 mb-3">A (อะ)</p>
                
                <div class="stroke-box shadow-sm">
                    <img id="strokeImg" src="https://raw.githubusercontent.com/kanjivg/kanjivg/master/kanji/03042.svg" class="stroke-img">
                </div>

                <div class="drawing-area">
                    <p class="small fw-bold text-secondary mb-2">ฝึกลากเส้นตามต้นแบบในกรอบนี้</p>
                    <div class="canvas-container">
                        <canvas id="writingCanvas" width="250" height="250"></canvas>
                    </div>
                    <div class="d-flex gap-2 mt-3">
                        <button class="btn btn-outline-secondary flex-grow-1 rounded-pill" onclick="clearCanvas()">
                            <i class="bi bi-eraser-fill"></i> ลบกระดาน
                        </button>
                        <button class="btn btn-danger flex-grow-1 rounded-pill" onclick="reloadStroke()">
                            <i class="bi bi-arrow-clockwise"></i> ดูวิธีเขียนใหม่
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ข้อมูลตัวอักษร
    const hiraganaData = [
        {c:'あ', r:'a', u:'03042'}, {c:'い', r:'i', u:'03044'}, {c:'う', r:'u', u:'03046'}, {c:'え', r:'e', u:'03048'}, {c:'お', r:'o', u:'0304a'},
        {c:'か', r:'ka', u:'0304b'}, {c:'き', r:'ki', u:'0304d'}, {c:'く', r:'ku', u:'0304f'}, {c:'け', r:'ke', u:'03051'}, {c:'こ', r:'ko', u:'03053'},
        {c:'さ', r:'sa', u:'03055'}, {c:'し', r:'shi', u:'03057'}, {c:'す', r:'su', u:'03059'}, {c:'せ', r:'se', u:'0305b'}, {c:'そ', r:'so', u:'0305d'},
        {c:'た', r:'ta', u:'0305f'}, {c:'ち', r:'chi', u:'03061'}, {c:'つ', r:'tsu', u:'03064'}, {c:'て', r:'te', u:'03066'}, {c:'と', r:'to', u:'03068'},
        {c:'な', r:'na', u:'0306a'}, {c:'に', r:'ni', u:'0306b'}, {c:'ぬ', r:'nu', u:'0306c'}, {c:'ね', r:'ne', u:'0306e'}, {c:'の', r:'no', u:'0306f'},
        {c:'は', r:'ha', u:'0306f'}, {c:'ひ', r:'hi', u:'03072'}, {c:'ふ', r:'fu', u:'03075'}, {c:'へ', r:'he', u:'03078'}, {c:'ほ', r:'ho', u:'0307b'},
        {c:'ま', r:'ma', u:'0307e'}, {c:'み', r:'mi', u:'0307f'}, {c:'む', r:'mu', u:'03083'}, {c:'め', r:'me', u:'03081'}, {c:'も', r:'mo', u:'03082'},
        {c:'や', r:'ya', u:'03084'}, {c:' ', r:'', u:''}, {c:'ゆ', r:'yu', u:'03086'}, {c:' ', r:'', u:''}, {c:'よ', r:'yo', u:'03088'},
        {c:'ら', r:'ra', u:'03089'}, {c:'り', r:'ri', u:'0308a'}, {c:'る', r:'ru', u:'0308b'}, {c:'れ', r:'re', u:'0308c'}, {c:'ろ', r:'ro', u:'0308d'},
        {c:'わ', r:'wa', u:'0308f'}, {c:' ', r:'', u:''}, {c:' ', r:'', u:''}, {c:' ', r:'', u:''}, {c:'を', r:'wo', u:'03092'},
        {c:'ん', r:'n', u:'03093'}
    ];

    const dakuonData = [
        {c:'が', r:'ga', u:'0304c'}, {c:'ぎ', r:'gi', u:'0304e'}, {c:'ぐ', r:'gu', u:'03050'}, {c:'げ', r:'ge', u:'03052'}, {c:'ご', r:'go', u:'03054'},
        {c:'ざ', r:'za', u:'03056'}, {c:'じ', r:'ji', u:'03058'}, {c:'ず', r:'zu', u:'0305a'}, {c:'ぜ', r:'ze', u:'0305c'}, {c:'ぞ', r:'ぞ', u:'0305e'},
        {c:'だ', r:'da', u:'03060'}, {c:'ぢ', r:'ji', u:'03062'}, {c:'づ', r:'zu', u:'03065'}, {c:'で', r:'de', u:'03067'}, {c:'ど', r:'do', u:'03069'},
        {c:'ば', r:'ba', u:'03070'}, {c:'び', r:'bi', u:'03073'}, {c:'ぶ', r:'bu', u:'03076'}, {c:'べ', r:'be', u:'03079'}, {c:'ぼ', r:'bo', u:'0307c'},
        {c:'ぱ', r:'pa', u:'03071'}, {c:'ぴ', r:'pi', u:'03074'}, {c:'ぷ', r:'pu', u:'03077'}, {c:'ぺ', r:'pe', u:'0307a'}, {c:'ぽ', r:'po', u:'0307d'}
    ];

    const yoonData = [
        {c:'きゃ', r:'kya', u:'0304d'}, {c:'きゅ', r:'kyu', u:'0304d'}, {c:'きょ', r:'kyo', u:'0304d'},
        {c:'しゃ', r:'sha', u:'03057'}, {c:'しゅ', r:'shu', u:'03057'}, {c:'しょ', r:'sho', u:'03057'},
        {c:'ちゃ', r:'cha', u:'03061'}, {c:'ちゅ', r:'chu', u:'03061'}, {c:'ちょ', r:'cho', u:'03061'},
        {c:'にゃ', r:'nya', u:'0306b'}, {c:'にゅ', r:'nyu', u:'0306b'}, {c:'にょ', r:'nyo', u:'0306b'}
    ];

    // สร้างปุ่ม
    function createGrid(data, gridId) {
        const grid = document.getElementById(gridId);
        data.forEach(item => {
            const btn = document.createElement('div');
            btn.className = item.c === ' ' ? 'char-btn empty' : 'char-btn shadow-sm';
            btn.innerText = item.c;
            if(item.c !== ' ') btn.onclick = () => selectChar(item, btn);
            grid.appendChild(btn);
        });
    }

    function selectChar(item, btn) {
        document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('currentChar').innerText = item.c;
        document.getElementById('romajiInfo').innerText = `${item.r.toUpperCase()} (${getThai(item.r)})`;
        document.getElementById('strokeImg').src = `https://raw.githubusercontent.com/kanjivg/kanjivg/master/kanji/${item.u}.svg`;
        clearCanvas();
        playVoice();
    }

    function getThai(r) {
        const map = {'a':'อะ','i':'อิ','u':'อุ','e':'เอ','o':'โอะ','ka':'คะ','ki':'คิ','ku':'คุ','ke':'เค','ko':'โคะ','sa':'สะ','shi':'ชิ','su':'สุ','se':'เสะ','so':'โสะ','ta':'ตะ','chi':'จิ','tsu':'สึ','te':'เตะ','to':'โตะ','na':'นะ','ni':'นิ','nu':'นุ','ne':'เนะ','no':'โนะ','ha':'ฮะ','hi':'ฮิ','fu':'ฟุ','he':'เฮะ','ho':'โฮะ','ma':'มะ','mi':'มิ','mu':'มุ','me':'เมะ','mo':'โมะ','ya':'ยะ','yu':'ยุ','yo':'โยะ','ra':'ระ','ri':'ริ','ru':'รุ','re':'เระ','ro':'โระ','wa':'วะ','wo':'โอะ','n':'อึน','ga':'กะ','gi':'กิ','gu':'กุ','ge':'เกะ','go':'โกะ','za':'ซะ','ji':'จิ','zu':'ซุ','ze':'เซะ','zo':'โซะ','da':'ดะ','de':'เดะ','do':'โดะ','ba':'บะ','bi':'บิ','bu':'บุ','be':'เบะ','bo':'โบะ','pa':'พะ','pi':'พิก','pu':'พุ','pe':'เปะ','po':'โพระ','kya':'เคียะ','kyu':'คิว','kyo':'เคียว','sha':'ชะ','shu':'ชุ','sho':'โช','cha':'จะ','chu':'จุ','cho':'โจ','nya':'เนียะ','nyu':'นิว','nyo':'เนียว'};
        return map[r] || r;
    }

    function playVoice() {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(document.getElementById('currentChar').innerText);
        msg.lang = 'ja-JP';
        msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    }

    function reloadStroke() {
        const img = document.getElementById('strokeImg');
        const s = img.src; img.src = ''; 
        setTimeout(() => img.src = s, 50);
    }

    // --- CANVAS LOGIC ---
    const canvas = document.getElementById('writingCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#333';

    function start(e) { drawing = true; draw(e); }
    function stop() { drawing = false; ctx.beginPath(); }
    function draw(e) {
        if(!drawing) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches[0].clientX) - rect.left;
        const y = (e.clientY || e.touches[0].clientY) - rect.top;
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
    canvas.addEventListener('touchend', stop);

    function clearCanvas() { ctx.clearRect(0,0,250,250); }

    // Initialize
    createGrid(hiraganaData, 'hiraGrid');
    createGrid(dakuonData, 'dakuonGrid');
    createGrid(yoonData, 'yoonGrid');
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
