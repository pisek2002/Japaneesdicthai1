<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>คลังวลี - Pisek Sensei</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Kanit:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f6f9; margin: 0; padding: 0; }
        .kanit { font-family: 'Kanit', sans-serif; }
        .navbar { background-color: #2c313c; z-index: 2000; }

        .header-box {
            background: white; padding: 25px 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative; z-index: 1500;
        }
        .search-wrapper {
            max-width: 500px; margin: 0 auto;
            border: 2px solid #0d6efd; border-radius: 50px;
            overflow: hidden; background: white;
        }

        .tabs-sticky {
            position: sticky; top: 56px;
            background: #ffffff; z-index: 1800;
            padding: 12px 0; border-bottom: 1px solid #eee;
        }
        
        .category-tabs {
            display: flex; overflow-x: auto; overflow-y: hidden;
            white-space: nowrap; gap: 12px; padding: 5px 20px;
            scrollbar-width: none;
        }
        .category-tabs::-webkit-scrollbar { display: none; }

        .tab-item {
            padding: 8px 20px; background: #f8f9fa; border: 2px solid #dee2e6; 
            color: #495057; border-radius: 50px; font-weight: 700; cursor: pointer; 
            transition: 0.2s;
        }
        
        .tab-item.active { 
            background: #0d6efd; border-color: #0d6efd; color: white; 
            box-shadow: 0 4px 10px rgba(13,110,253,0.3); 
        }

        .vocab-card {
            background: white; border-radius: 20px; padding: 20px;
            height: 100%; box-shadow: 0 3px 15px rgba(0,0,0,0.05);
            border-left: 6px solid #0d6efd; transition: 0.3s; position: relative;
        }
        .vocab-card:hover { transform: translateY(-5px); }

        .reading-box {
            background-color: #f8f9fa; border-left: 4px solid #dc3545;
            padding: 12px; border-radius: 10px; margin-top: 15px;
        }
        .btn-speak {
            position: absolute; top: 15px; right: 15px;
            color: #0d6efd; cursor: pointer; font-size: 1.2rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark sticky-top shadow-sm">
    <div class="container d-flex align-items-center">
        <div class="intro-content d-flex align-items-center">
            <img src="logo.jpg" alt="Logo" style="width: 40px; height: 40px; border-radius: 50%; margin-right: 10px;">
            <a class="navbar-brand fw-bold" href="index.html">วลีที่ใช้ในการสนทนา</a>
        </div>
        <a href="index.html" class="btn btn-sm btn-outline-light rounded-pill ms-auto">กลับหน้าหลัก</a>
    </div>
</nav>

<div class="header-box text-center">
    <h4 class="fw-bold mb-3 text-dark">วลีเฉพาะทางต่างๆ</h4>
    <div class="search-wrapper shadow-sm d-flex align-items-center">
        <span class="px-3"><i class="bi bi-search text-primary"></i></span>
        <input type="text" id="smartSearch" class="form-control border-0 shadow-none" 
               placeholder="ค้นหาคันจิ, คำอ่าน, ความหมาย..." onkeyup="filterData()">
    </div>
</div>

<div class="tabs-sticky">
    <div class="category-tabs" id="tabContainer">
        <div class="tab-item active" onclick="setTab('All', this)">ทั้งหมด</div>
    </div>
</div>

<div class="container py-4">
    <div id="statusArea" class="text-center py-5">
        <div class="spinner-border text-primary mb-2"></div>
        <p>กำลังโหลดข้อมูลคำศัพท์...</p>
    </div>
    <!-- ID ต้องเป็น vocabList เพื่อให้ตรงกับ JavaScript -->
    <div class="row g-3" id="vocabList"></div>
</div>

<script>
    let vocabData = []; 
    let activeTab = 'All';

    async function loadData() {
        const status = document.getElementById('statusArea');
        try {
            const response = await fetch('data_phrase.json');
            if (!response.ok) throw new Error();
            vocabData = await response.json();
            
            status.classList.add('d-none');
            renderTabs();
            filterData();
        } catch (e) {
            status.innerHTML = `<div class="alert alert-danger">ไม่พบไฟล์ data_phrase.json หรือเกิดข้อผิดพลาดในการโหลด</div>`;
        }
    }

    function renderTabs() {
        const container = document.getElementById('tabContainer');
        const categories = [...new Set(vocabData.map(item => item.หมวด))];
        
        categories.forEach(cat => {
            if(cat) {
                const div = document.createElement('div');
                div.className = 'tab-item';
                div.innerText = cat;
                div.onclick = function() { setTab(cat, this); };
                container.appendChild(div);
            }
        });
    }

    function setTab(cat, el) {
        activeTab = cat;
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        filterData();
    }

    function filterData() {
        const query = document.getElementById('smartSearch').value.toLowerCase().trim();
        const filtered = vocabData.filter(item => {
            // 1. ตรวจสอบการเลือกหมวดหมู่ (Tab)
            const matchTab = (activeTab === 'All' || item.หมวด === activeTab);
            
            // 2. รวมข้อมูลทุกฟิลด์ที่ต้องการให้ค้นหาเจอ (เพิ่มคำอ่านไทย และ Romaji ทุกรูปแบบ)
            const textToSearch = [
                item.คันจิ,
                item.ฮิระงะนะ,
                item.ความหมายไทย,
                item.meaning,
                item.Romaji,
                item.romaji,
                item["ローマ字"], // คีย์ชื่อญี่ปุ่น
                item["คำอ่านไทย"], // คีย์ภาษาไทย
                item.thaiReading
            ].filter(val => val).join(' ').toLowerCase(); // กรองเฉพาะที่มีข้อมูลและรวมเป็นข้อความเดียว
            
            // 3. ตรวจสอบว่าคำที่พิมพ์มีอยู่ในข้อมูลหรือไม่
            const matchQuery = textToSearch.includes(query);
            
            return matchTab && matchQuery;
        });
        renderCards(filtered);
    }

    function renderCards(data) {
        const container = document.getElementById('vocabList');
        if (!container) return;

        if (!data || data.length === 0) {
            container.innerHTML = `<div class="text-center p-5 w-100">
                <i class="bi bi-search fs-1 text-muted"></i>
                <p class="mt-2 text-muted">ไม่พบข้อมูลที่ค้นหา</p>
            </div>`;
            return;
        }

        container.innerHTML = data.map(item => {
            const romaji = item["ローマ字"] || item.Romaji || item.romaji || '-';
            const thaiReading = item["คำอ่านไทย"] || item.thaiReading || '-';
            const kanji = item["คันจิ"] || '';
            const hiragana = item["ฮิระงะนะ"] || '';
            const meaning = item["ความหมายไทย"] || item.meaning || '';
            const speakText = kanji || hiragana;

            return `
                <div class="col-md-6 col-lg-4 animate__animated animate__fadeIn">
                    <div class="vocab-card shadow-sm">
                        <i class="bi bi-volume-up-fill btn-speak" onclick="playVoice('${speakText}')"></i>
                        <div class="mb-2">
                            <h3 class="kanit fw-bold mb-0 text-dark">${kanji || hiragana}</h3>
                            ${kanji ? `<small class="text-primary fw-bold">${hiragana}</small>` : ''}
                        </div>
                        
                        <p class="fs-5 text-success mb-2 fw-bold">${meaning}</p>
                        
                        <div class="reading-box">
                            <div class="mb-1">
                                <small class="text-muted d-block" style="font-size: 0.7rem;">ROMAJI</small>
                                <span class="text-dark" style="font-family: 'monospace';">${romaji}</span>
                            </div>
                            <div>
                                <small class="text-muted d-block" style="font-size: 0.7rem;">คำอ่านไทย</small>
                                <span class="text-danger fw-bold">${thaiReading}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function playVoice(t) {
        if(!t) return;
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'ja-JP'; 
        m.rate = 0.85;
        window.speechSynthesis.speak(m);
    }

    document.addEventListener('DOMContentLoaded', loadData);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
